<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문의 관리 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#E8F4FD;--sky-mid:#C3E0F7;--sky-deep:#7BBFE8;--sky-text:#1A5F8A;
  --yellow:#FFFBE6;--yellow-mid:#FFF0A0;--yellow-text:#7A5800;
  --white:#FFFFFF;--surface:#F7FBFF;
  --ink:#1C2B3A;--ink2:#4A6480;--ink3:#8CA8BF;
  --border:#D6EAF8;--border2:#BDD8EF;
  --radius:12px;--radius-sm:8px;--radius-lg:16px;
  --green-bg:#E8F8F0;--green-text:#1A7A4A;--green-border:#A8DFC0;
  --red-bg:#FFF0F0;--red-text:#C0392B;--red-border:#F5A0A0;
  --amber-bg:#FFF8E6;--amber-text:#8A5A00;--amber-border:#F5CC80;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--surface);min-height:100vh;color:var(--ink)}
.app{max-width:960px;margin:0 auto;padding:2rem 1.5rem}

/* 상단바 */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:1.5px solid var(--border);flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--sky-mid),var(--yellow-mid));border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-text{font-size:16px;font-weight:500;color:var(--ink);letter-spacing:-0.3px}
.logo-sub{font-size:11px;color:var(--ink3);margin-top:1px}
.tabs{display:flex;gap:2px;background:var(--sky);padding:4px;border-radius:var(--radius);border:1px solid var(--border)}
.tab{padding:7px 14px;border-radius:9px;font-size:12.5px;cursor:pointer;border:none;background:transparent;color:var(--ink2);font-weight:400;transition:all .18s;font-family:'Noto Sans KR',sans-serif}
.tab.active{background:var(--white);color:var(--sky-text);font-weight:500;box-shadow:0 1px 4px rgba(123,191,232,.18)}
.panel{display:none}.panel.active{display:block}

/* 상태 표시 */
.status-bar{display:flex;align-items:center;gap:6px;margin-bottom:1rem;padding:6px 12px;border-radius:20px;width:fit-content;font-size:12px}
.status-bar.connected{background:var(--green-bg);color:var(--green-text)}
.status-bar.error{background:var(--red-bg);color:var(--red-text)}
.status-bar.loading{background:var(--sky);color:var(--sky-text)}
.status-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.btn-sync{padding:3px 10px;border:1px solid currentColor;border-radius:10px;font-size:11px;cursor:pointer;background:transparent;color:inherit;font-family:'Noto Sans KR',sans-serif;opacity:.7;transition:opacity .13s;margin-left:4px}
.btn-sync:hover{opacity:1}

/* 검색 */
.search-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem;box-shadow:0 2px 12px rgba(123,191,232,.08)}
.search-row{display:flex;gap:8px;align-items:center}
.search-input{flex:1;border:none;outline:none;font-size:14px;color:var(--ink);background:transparent;font-family:'Noto Sans KR',sans-serif}
.search-input::placeholder{color:var(--ink3)}
.filter-row{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.chip{padding:5px 13px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:var(--white);color:var(--ink2);transition:all .15s;font-family:'Noto Sans KR',sans-serif}
.chip:hover{background:var(--sky);border-color:var(--sky-deep)}
.chip.active{background:var(--sky-text);color:#fff;border-color:var(--sky-text)}
.faq-list{display:flex;flex-direction:column;gap:6px}
.faq-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .18s}
.faq-card:hover{border-color:var(--sky-deep);box-shadow:0 2px 10px rgba(123,191,232,.12)}
.faq-hd{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;cursor:pointer}
.expand-wrap{width:20px;height:20px;border-radius:6px;background:var(--sky);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.faq-card.open .expand-wrap{background:var(--sky-mid)}
.expand-icon{font-size:9px;color:var(--sky-text);transition:transform .2s}
.faq-card.open .expand-icon{transform:rotate(90deg)}
.faq-q{font-size:13.5px;color:var(--ink);flex:1;line-height:1.55;font-weight:500}
.faq-meta{display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:wrap}
.m-cat{font-size:11px;padding:2px 9px;border-radius:8px;background:var(--sky);color:var(--sky-text);border:1px solid var(--sky-mid)}
.m-freq{font-size:11px;padding:2px 9px;border-radius:8px;background:var(--yellow);color:var(--yellow-text);border:1px solid var(--yellow-mid);font-weight:500}
.m-date{font-size:11px;color:var(--ink3)}
.faq-bd{display:none;padding:0 16px 14px}
.faq-card.open .faq-bd{display:block}
.answer-box{background:var(--surface);border-left:3px solid var(--sky-deep);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;font-size:13px;color:var(--ink2);line-height:1.7;margin-bottom:10px;white-space:pre-wrap}
.log-section{margin-top:6px}
.log-title{font-size:11px;color:var(--ink3);margin-bottom:6px;font-weight:500}
.log-entry{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;font-size:12px;color:var(--ink2);background:var(--surface);margin-bottom:3px}
.log-date{color:var(--ink3);min-width:82px;font-size:11px}
.log-uni{flex:1}
.log-del{cursor:pointer;font-size:11px;color:var(--ink3);padding:2px 6px;border-radius:4px;border:1px solid transparent;transition:all .12s}
.log-del:hover{border-color:var(--red-border);color:var(--red-text);background:var(--red-bg)}
.add-log-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.add-log-row input{flex:1;min-width:100px;padding:6px 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:12px;background:var(--white);color:var(--ink);font-family:'Noto Sans KR',sans-serif;outline:none}
.add-log-row input:focus{border-color:var(--sky-deep)}
.btn-addlog{padding:6px 12px;font-size:12px;border:1px solid var(--sky-deep);border-radius:var(--radius-sm);cursor:pointer;background:var(--sky);color:var(--sky-text);font-family:'Noto Sans KR',sans-serif;white-space:nowrap}
.btn-addlog:hover{background:var(--sky-mid)}
.card-actions{display:flex;gap:6px;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.btn-sm{padding:4px 12px;font-size:12px;border:1px solid var(--border2);border-radius:6px;cursor:pointer;background:var(--white);color:var(--ink2);font-family:'Noto Sans KR',sans-serif;transition:all .12s}
.btn-sm:hover{background:var(--sky);border-color:var(--sky-deep);color:var(--sky-text)}
.btn-sm.del:hover{background:var(--red-bg);border-color:var(--red-border);color:var(--red-text)}
.empty-state{text-align:center;padding:3.5rem 1rem;color:var(--ink3)}
.empty-state p{font-size:13px;margin-top:8px}

/* 폼 */
.form-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1rem}
.form-card h2{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:1.25rem;padding-bottom:10px;border-bottom:1px solid var(--border)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11.5px;color:var(--ink2);margin-bottom:5px;font-weight:500}
.fg input,.fg textarea,.fg select{width:100%;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;background:var(--white);color:var(--ink);font-family:'Noto Sans KR',sans-serif;outline:none;transition:border .13s}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--sky-deep);background:var(--sky)}
.fg textarea{resize:vertical;min-height:80px;line-height:1.6}
.form-actions{display:flex;gap:8px;margin-top:4px}
.btn-save{padding:8px 20px;background:var(--sky-text);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-weight:500;font-family:'Noto Sans KR',sans-serif}
.btn-save:hover{opacity:.85}
.btn-reset{padding:8px 16px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;background:var(--white);color:var(--ink2);font-family:'Noto Sans KR',sans-serif}
.btn-reset:hover{background:var(--sky)}
mark{background:var(--yellow-mid);border-radius:2px;padding:0 1px;color:inherit}

/* 카테고리 */
.cat-table{width:100%;border-collapse:collapse;margin-bottom:1rem}
.cat-table th{text-align:left;font-size:11.5px;font-weight:500;color:var(--ink3);padding:6px 10px;border-bottom:1.5px solid var(--border)}
.cat-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.cat-table tr:last-child td{border-bottom:none}
.cat-table tr:hover td{background:var(--surface)}
.cat-name-cell{display:flex;align-items:center;gap:8px}
.cat-name-display{font-size:13px;color:var(--ink);font-weight:500;cursor:pointer;padding:4px 8px;border-radius:6px;border:1px solid transparent;transition:all .13s;flex:1}
.cat-name-display:hover{background:var(--sky);border-color:var(--sky-mid)}
.cat-name-input{font-size:13px;color:var(--ink);padding:4px 8px;border:1px solid var(--sky-deep);border-radius:6px;background:var(--sky);font-family:'Noto Sans KR',sans-serif;outline:none;flex:1}
.cat-count-num{font-size:13px;font-weight:500;color:var(--sky-text);font-family:'DM Sans',sans-serif}
.cat-edit-btn{padding:3px 10px;font-size:11.5px;border:1px solid var(--border2);border-radius:6px;cursor:pointer;background:var(--white);color:var(--ink2);font-family:'Noto Sans KR',sans-serif;transition:all .12s;white-space:nowrap}
.cat-edit-btn:hover{background:var(--sky);border-color:var(--sky-deep);color:var(--sky-text)}
.cat-edit-btn.save{background:var(--sky-text);color:#fff;border-color:var(--sky-text)}
.cat-edit-btn.save:hover{opacity:.85}
.cat-del-btn{padding:3px 10px;font-size:11.5px;border:1px solid var(--border2);border-radius:6px;cursor:pointer;background:var(--white);color:var(--ink2);font-family:'Noto Sans KR',sans-serif;transition:all .12s;white-space:nowrap}
.cat-del-btn:hover{background:var(--red-bg);border-color:var(--red-border);color:var(--red-text)}
.add-cat-row{display:flex;gap:8px;align-items:center;padding-top:14px;border-top:1px solid var(--border)}
.add-cat-row input{padding:7px 11px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;background:var(--white);color:var(--ink);font-family:'Noto Sans KR',sans-serif;flex:1;outline:none;max-width:200px}
.add-cat-row input:focus{border-color:var(--sky-deep)}
.edit-hint{font-size:11px;color:var(--ink3);margin-bottom:12px}

/* 다중 카테고리 선택 */
.cat-check-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.cat-check-item{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;border:1px solid var(--border2);background:var(--white);cursor:pointer;transition:all .15s;user-select:none;font-size:12.5px;color:var(--ink2)}
.cat-check-item:hover{border-color:var(--sky-deep);background:var(--sky)}
.cat-check-item.checked{background:var(--sky-text);color:#fff;border-color:var(--sky-text)}
.cat-check-item.disabled{opacity:.4;cursor:not-allowed}
.cat-limit-hint{font-size:11px;color:var(--ink3);margin-top:6px}
.filter-reset{padding:5px 11px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:var(--white);color:var(--ink3);transition:all .15s;font-family:'Noto Sans KR',sans-serif}
.filter-reset:hover{background:var(--surface);color:var(--ink2)}

/* 통계 */
.stats-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.1rem;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--sky-deep),var(--sky-mid))}
.kpi-label{font-size:11px;color:var(--ink3);margin-bottom:6px;font-weight:500}
.kpi-num{font-size:22px;font-weight:500;color:var(--sky-text);font-family:'DM Sans',sans-serif;line-height:1}
.kpi-sub{font-size:11px;color:var(--ink3);margin-top:4px}
.stats-row2{display:grid;grid-template-columns:1.4fr 1fr;gap:12px;margin-bottom:12px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem}
.stat-card-title{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between}
.stat-card-title span{font-size:11px;font-weight:400;color:var(--ink3)}
.chart-area{position:relative;height:160px;display:flex;align-items:flex-end;gap:6px;padding-bottom:24px}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px}
.bar-inner{width:100%;border-radius:5px 5px 0 0;background:linear-gradient(180deg,var(--sky-deep),var(--sky-mid));min-height:2px;position:relative}
.bar-inner:hover{background:linear-gradient(180deg,var(--sky-text),var(--sky-deep))}
.bar-val{font-size:10px;color:var(--sky-text);font-weight:500;font-family:'DM Sans',sans-serif}
.bar-label{font-size:10px;color:var(--ink3);position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);white-space:nowrap}
.cat-bar-row{margin-bottom:10px}
.cat-bar-hd{display:flex;justify-content:space-between;font-size:12px;color:var(--ink2);margin-bottom:5px}
.cat-bar-hd span:last-child{color:var(--sky-text);font-weight:500;font-family:'DM Sans',sans-serif}
.cat-bar-track{height:8px;background:var(--sky);border-radius:4px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--sky-deep),var(--sky-text))}
.timeline-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem}
.tl-title{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between}
.tl-title span{font-size:11px;font-weight:400;color:var(--ink3)}
.tl-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.tl-item:last-child{border-bottom:none}
.tl-dot-wrap{display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding-top:3px}
.tl-dot{width:10px;height:10px;border-radius:50%;background:var(--sky-deep);border:2px solid #fff;box-shadow:0 0 0 2px var(--sky-mid)}
.tl-line{width:1.5px;flex:1;background:var(--border);min-height:10px}
.tl-item:last-child .tl-line{display:none}
.tl-body{flex:1}
.tl-top{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.tl-uni{font-size:13px;font-weight:500;color:var(--ink)}
.tl-cat{font-size:11px;padding:1px 8px;border-radius:8px;background:var(--sky);color:var(--sky-text);border:1px solid var(--sky-mid)}
.tl-date{font-size:11px;color:var(--ink3);margin-left:auto}
.tl-q{font-size:12px;color:var(--ink2);line-height:1.5}
.period-btns{display:flex;gap:4px}
.period-btn{padding:3px 10px;font-size:11px;border-radius:6px;cursor:pointer;border:1px solid var(--border2);background:var(--white);color:var(--ink2);font-family:'Noto Sans KR',sans-serif;transition:all .13s}
.period-btn.active{background:var(--sky-text);color:#fff;border-color:var(--sky-text)}

/* AI 채팅 */
.chat-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.chat-notice{background:var(--yellow);border-bottom:1px solid var(--yellow-mid);padding:9px 16px;font-size:12px;color:var(--yellow-text);display:flex;align-items:center;gap:6px}
.chat-msgs{min-height:300px;max-height:440px;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:9px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.msg-av{width:28px;height:28px;border-radius:50%;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.msg.ai .msg-av{background:var(--sky);color:var(--sky-text);border:1px solid var(--sky-mid)}
.msg.user .msg-av{background:var(--sky-text);color:#fff}
.msg-bub{max-width:78%;padding:10px 14px;font-size:13px;line-height:1.65;white-space:pre-wrap}
.msg.ai .msg-bub{background:var(--surface);color:var(--ink);border:1px solid var(--border);border-radius:var(--radius-sm) var(--radius-lg) var(--radius-lg) var(--radius-lg)}
.msg.user .msg-bub{background:var(--sky-text);color:#fff;border-radius:var(--radius-lg) var(--radius-sm) var(--radius-lg) var(--radius-lg)}
.typing-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--ink3);margin:0 2px;animation:blink 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.chat-input-row{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);background:var(--surface)}
.chat-input-row input{flex:1;padding:9px 13px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13.5px;background:var(--white);color:var(--ink);font-family:'Noto Sans KR',sans-serif;outline:none}
.chat-input-row input:focus{border-color:var(--sky-deep)}
.chat-send{padding:9px 18px;background:var(--sky-text);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-weight:500;font-family:'Noto Sans KR',sans-serif}
.chat-send:hover{opacity:.85}.chat-send:disabled{opacity:.4;cursor:not-allowed}
.chat-clr{padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;background:var(--white);color:var(--ink2);font-family:'Noto Sans KR',sans-serif}
.chat-clr:hover{background:var(--sky)}


/* 잠금 화면 */
.lock-screen{position:fixed;inset:0;background:var(--surface);z-index:9999;display:flex;align-items:center;justify-content:center}
.lock-box{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.5rem 2rem;width:min(360px,90vw);text-align:center;box-shadow:0 4px 24px rgba(123,191,232,.15)}
.lock-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--sky-mid),var(--yellow-mid));border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem}
.lock-title{font-size:17px;font-weight:500;color:var(--ink);margin-bottom:6px}
.lock-sub{font-size:12.5px;color:var(--ink3);margin-bottom:1.5rem}
.lock-input{width:100%;padding:10px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:16px;text-align:center;letter-spacing:6px;background:var(--white);color:var(--ink);font-family:'DM Sans',sans-serif;outline:none;transition:border .13s}
.lock-input:focus{border-color:var(--sky-deep);background:var(--sky)}
.lock-input.error{border-color:var(--red-border);background:var(--red-bg)}
.lock-btn{width:100%;margin-top:12px;padding:10px;background:var(--sky-text);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;cursor:pointer;font-weight:500;font-family:'Noto Sans KR',sans-serif}
.lock-btn:hover{opacity:.85}
.lock-err{font-size:12px;color:var(--red-text);margin-top:8px;height:16px}
/* 모달 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:8000;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--white);border-radius:var(--radius-lg);padding:1.75rem;width:min(340px,90vw);border:1px solid var(--border)}
.modal h3{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:4px}
.modal p{font-size:12px;color:var(--ink3);margin-bottom:1.25rem}
.modal input{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:15px;text-align:center;letter-spacing:5px;font-family:'DM Sans',sans-serif;outline:none;background:var(--white);color:var(--ink);transition:border .13s;margin-bottom:4px}
.modal input:focus{border-color:var(--sky-deep);background:var(--sky)}
.modal input.error{border-color:var(--red-border);background:var(--red-bg)}
.modal-err{font-size:12px;color:var(--red-text);margin-top:4px;height:16px}
.modal-btns{display:flex;gap:8px;margin-top:1rem;justify-content:flex-end}
.modal-cancel{padding:8px 16px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;background:var(--white);color:var(--ink2);font-family:'Noto Sans KR',sans-serif}
.modal-ok{padding:8px 20px;background:var(--sky-text);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;font-weight:500;font-family:'Noto Sans KR',sans-serif}
/* 관리자 */
.admin-badge{display:none;padding:4px 11px;border-radius:20px;font-size:11.5px;font-weight:500;background:var(--amber-bg);color:var(--amber-text);border:1px solid var(--amber-border)}
.admin-badge.visible{display:inline-flex;align-items:center;gap:5px}
.topbar-right{display:flex;align-items:center;gap:8px}
.logo{cursor:pointer;user-select:none}
.logo-icon{transition:transform .1s}
.logo-icon:active{transform:scale(.92)}
.tab.admin-only{display:none}
.tab.admin-only.visible{display:block}
.btn-sm.admin-action{display:none}
.btn-sm.admin-action.visible{display:inline-flex}
.admin-panel{background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.25rem}
.admin-panel h3{font-size:13px;font-weight:500;color:var(--amber-text);margin-bottom:1rem}
.admin-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-admin{padding:7px 16px;border:1px solid var(--amber-border);border-radius:var(--radius-sm);font-size:12.5px;cursor:pointer;background:var(--white);color:var(--amber-text);font-family:'Noto Sans KR',sans-serif;transition:all .13s}
.btn-admin:hover{background:var(--amber-border)}

/* 로딩 */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(247,251,255,.8);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loading-overlay.show{display:flex}
.loading-spinner{width:32px;height:32px;border:3px solid var(--sky-mid);border-top-color:var(--sky-text);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--ink2)}

@media(max-width:600px){
  .stats-kpi{grid-template-columns:1fr 1fr}
  .stats-row2{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .tabs{flex-wrap:wrap}
}
</style>
</head>
<body>


<!-- 잠금 화면 -->

<script>
// ================================================================
// 설정
// ================================================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwhdld9Wvyn463gRH_IQq1YDlK4gZ8CQ1SO7cgw5zspQeu0RLlPzl3FNNAvDHlWnxYwwA/exec';
const LS_DATA = 'faq_v2';
const LS_CATS = 'faq_cats_v2';

const LS_ACCESS_PW = 'faq_access_pw';
const LS_ADMIN_PW  = 'faq_admin_pw';
let items = [], categories = [], activeCategories = new Set();
let isAdmin = false;
let logoClickCount = 0, logoClickTimer = null, pwChangeTarget = '';
let chatHistory = [], isLoading = false, chartPeriod = 6;
let editingCatIdx = -1;
let saveTimer = null;


// ================================================================
// 비밀번호 관리
// ================================================================
function getAccessPw() { return localStorage.getItem(LS_ACCESS_PW) || '1234'; }
function getAdminPw()  { return localStorage.getItem(LS_ADMIN_PW)  || '0818'; }

function checkLock() {
  const val = document.getElementById('lock-input').value;
  const inp = document.getElementById('lock-input');
  if (val === getAccessPw()) {
    document.getElementById('lock-screen').style.display = 'none';
    loadFromSheets();
  } else {
    inp.classList.add('error');
    document.getElementById('lock-err').textContent = '비밀번호가 올바르지 않습니다.';
    inp.value = '';
    setTimeout(() => { inp.classList.remove('error'); document.getElementById('lock-err').textContent = ''; }, 1500);
  }
}
document.getElementById('lock-input').addEventListener('input', () => {
  document.getElementById('lock-input').classList.remove('error');
  document.getElementById('lock-err').textContent = '';
});

function handleLogoClick() {
  logoClickCount++;
  clearTimeout(logoClickTimer);
  if (logoClickCount >= 3) {
    logoClickCount = 0;
    if (isAdmin) { logoutAdmin(); return; }
    openAdminModal();
  } else {
    logoClickTimer = setTimeout(() => { logoClickCount = 0; }, 800);
  }
}
function openAdminModal() {
  document.getElementById('admin-modal').classList.add('open');
  document.getElementById('admin-pw-input').value = '';
  document.getElementById('admin-err').textContent = '';
  setTimeout(() => document.getElementById('admin-pw-input').focus(), 100);
}
function closeAdminModal() { document.getElementById('admin-modal').classList.remove('open'); }
function checkAdmin() {
  const val = document.getElementById('admin-pw-input').value;
  const inp = document.getElementById('admin-pw-input');
  if (val === getAdminPw()) { closeAdminModal(); activateAdmin(); }
  else {
    inp.classList.add('error');
    document.getElementById('admin-err').textContent = '비밀번호가 올바르지 않습니다.';
    inp.value = '';
    setTimeout(() => { inp.classList.remove('error'); document.getElementById('admin-err').textContent = ''; }, 1500);
  }
}
function activateAdmin() {
  isAdmin = true;
  document.getElementById('admin-badge').classList.add('visible');
  document.getElementById('tab-cats').classList.add('visible');
  renderList();
}
function logoutAdmin() {
  isAdmin = false;
  document.getElementById('admin-badge').classList.remove('visible');
  document.getElementById('tab-cats').classList.remove('visible');
  const activeName = document.querySelector('.tab.active')?.textContent.trim();
  if (activeName === '카테고리') switchTab('search');
  renderList();
}
function openPwChange(target) {
  pwChangeTarget = target;
  document.getElementById('pw-change-title').textContent = target === 'access' ? '접속 비밀번호 변경' : '관리자 비밀번호 변경';
  document.getElementById('pw-change-sub').textContent = target === 'access' ? '새 접속 비밀번호를 입력하세요' : '새 관리자 비밀번호를 입력하세요';
  document.getElementById('pw-new').value = '';
  document.getElementById('pw-confirm').value = '';
  document.getElementById('pw-change-err').textContent = '';
  document.getElementById('pw-change-modal').classList.add('open');
  setTimeout(() => document.getElementById('pw-new').focus(), 100);
}
function closePwChange() { document.getElementById('pw-change-modal').classList.remove('open'); }
function savePwChange() {
  const nw = document.getElementById('pw-new').value;
  const cf = document.getElementById('pw-confirm').value;
  if (!nw) { document.getElementById('pw-change-err').textContent = '비밀번호를 입력해주세요.'; return; }
  if (nw !== cf) { document.getElementById('pw-change-err').textContent = '비밀번호가 일치하지 않습니다.'; return; }
  if (pwChangeTarget === 'access') localStorage.setItem(LS_ACCESS_PW, nw);
  else localStorage.setItem(LS_ADMIN_PW, nw);
  closePwChange();
  alert(`${pwChangeTarget === 'access' ? '접속' : '관리자'} 비밀번호가 변경되었습니다.`);
}

// ================================================================
// CSV 내보내기
// ================================================================
function exportCSV() {
  const rows = [['id','문의내용','답변','카테고리','문의건수','최초등록일','문의이력']];
  items.forEach(i => {
    const logs = (i.logs || []).map(l => l.date + ' ' + l.university).join(' | ');
    rows.push([i.id, '"' + (i.question||'').replace(/"/g,'""') + '"', '"' + (i.answer||'').replace(/"/g,'""') + '"',
      i.category, (i.logs||[]).length, i.created, '"' + logs + '"']);
  });
  const csv = '\uFEFF' + rows.map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  a.download = '문의데이터_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

// ================================================================
// Google Sheets 연동
// ================================================================
async function loadFromSheets() {
  updateStatus('loading', '연결 중...');
  try {
    const res = await fetch(`${SCRIPT_URL}?action=getAll`);
    const json = await res.json();
    if (json.ok) {
      items = (json.data.items || []).map(normalizeItem);
      categories = json.data.categories || [];
      persistLocal();
      updateStatus('connected', '연결됨');
      renderFilters();
      renderList();
      populateCategorySelect([]);
    } else {
      updateStatus('error', '오류: ' + json.error);
    }
  } catch(e) {
    updateStatus('error', '연결 실패');
    loadLocal();
    renderFilters(); renderList(); populateCategorySelect([]);
  } finally {
    hideLoading();
  }
}

async function saveToSheets() {
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'saveAll', items, categories })
    });
    const json = await res.json();
    if (!json.ok) console.error('저장 실패:', json.error);
  } catch(e) {
    console.error('저장 오류:', e);
  } finally {
    hideLoading();
  }
}

function scheduleSave() {
  persistLocal();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveToSheets(), 2000);
}

function updateStatus(state, text) {
  const bar = document.getElementById('status-bar');
  const txt = document.getElementById('status-text');
  const btn = document.getElementById('sync-btn');
  bar.className = 'status-bar ' + state;
  txt.textContent = text;
  btn.style.display = state === 'connected' ? '' : 'none';
}

// 날짜 정규화: ISO 문자열 → YYYY-MM-DD
function normalizeDate(d) {
  if (!d) return '';
  if (typeof d === 'string' && d.length > 10) return d.slice(0, 10);
  return String(d).slice(0, 10);
}

function normalizeItem(item) {
  return {
    ...item,
    created: normalizeDate(item.created),
    logs: (item.logs || []).map(l => ({ ...l, date: normalizeDate(l.date) }))
  };
}

// ================================================================
// 로컬 저장/불러오기 (오프라인 fallback)
// ================================================================
function persistLocal() {
  try {
    localStorage.setItem(LS_DATA, JSON.stringify(items));
    localStorage.setItem(LS_CATS, JSON.stringify(categories));
  } catch(e) {}
}

function loadLocal() {
  try {
    const s = localStorage.getItem(LS_DATA);
    const c = localStorage.getItem(LS_CATS);
    if (s) items = JSON.parse(s);
    if (c) categories = JSON.parse(c);
  } catch(e) {}
}

// ================================================================
// UI 유틸
// ================================================================
function showLoading(text) {
  document.getElementById('loading-text').textContent = text || '처리 중...';
  document.getElementById('loading').classList.add('show');
}
function hideLoading() {
  document.getElementById('loading').classList.remove('show');
}
function hl(t, q) {
  if (!q) return t;
  return t.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'), '<mark>$1</mark>');
}

// ================================================================
// 검색 / 목록
// ================================================================
function renderFilters() {
  const row = document.getElementById('cat-filters');
  const chips = categories.map(c => {
    const on = activeCategories.has(c);
    return `<button class="chip${on ? ' active' : ''}" onclick="toggleFilter('${c.replace(/'/g, "\\'")}')">${c}</button>`;
  }).join('');
  row.innerHTML = `<button class="filter-reset${activeCategories.size === 0 ? ' active' : ''}" onclick="clearFilters()">전체</button>` + chips;
}

function toggleFilter(c) {
  if (activeCategories.has(c)) {
    activeCategories.delete(c);
  } else {
    if (activeCategories.size >= 3) {
      alert('카테고리 필터는 최대 3개까지 선택 가능합니다.');
      return;
    }
    activeCategories.add(c);
  }
  renderFilters(); renderList();
}

function clearFilters() { activeCategories.clear(); renderFilters(); renderList(); }

// 아이템의 카테고리 목록 파싱 (문자열 또는 배열)
function getItemCats(item) {
  if (Array.isArray(item.category)) return item.category;
  if (typeof item.category === 'string') return item.category.split(',').map(s => s.trim()).filter(Boolean);
  return [];
}

function renderList() {
  const q = (document.getElementById('search-input').value || '').trim();
  let f = items.filter(i => {
    const cats = getItemCats(i);
    const mc = activeCategories.size === 0 || cats.some(c => activeCategories.has(c));
    const unis = (i.logs || []).map(l => l.university).join(' ');
    return mc && (!q || (i.question + i.answer + unis).toLowerCase().includes(q.toLowerCase()));
  }).sort((a, b) => (b.logs || []).length - (a.logs || []).length);

  const el = document.getElementById('faq-list');
  if (!f.length) { el.innerHTML = `<div class="empty-state"><p>검색 결과가 없습니다</p></div>`; return; }
  el.innerHTML = f.map(i => {
    const cats = getItemCats(i);
    const catBadges = cats.map(c => `<span class="m-cat">${c}</span>`).join('');
    return `
    <div class="faq-card" id="card-${i.id}">
      <div class="faq-hd" onclick="toggleCard(${i.id})">
        <div class="expand-wrap"><span class="expand-icon">▶</span></div>
        <div style="flex:1">
          <div class="faq-q">${hl(i.question, q)}</div>
          <div class="faq-meta">
            ${catBadges}
            <span class="m-freq">문의 ${(i.logs || []).length}회</span>
            <span class="m-date">${i.created}</span>
          </div>
        </div>
      </div>
      <div class="faq-bd">
        <div class="answer-box">${hl(i.answer, q)}</div>
        <div class="log-section">
          <div class="log-title">문의 이력 (${(i.logs || []).length}건)</div>
          ${(i.logs || []).length
            ? i.logs.map((l, li) => `
              <div class="log-entry">
                <span class="log-date">${l.date}</span>
                <span class="log-uni">${hl(l.university || '-', q)}</span>
                <span class="log-del" onclick="deleteLog(${i.id}, ${li})">삭제</span>
              </div>`).join('')
            : `<div style="font-size:12px;color:var(--ink3);padding:4px 0">이력 없음</div>`}
          <div class="add-log-row">
            <input type="date" id="ld-${i.id}" value="${new Date().toISOString().slice(0,10)}" style="width:130px;flex:none">
            <input type="text" id="lu-${i.id}" placeholder="대학명 입력" onkeydown="if(event.key==='Enter')addLog(${i.id})">
            <button class="btn-addlog" onclick="addLog(${i.id})">+ 문의 추가</button>
          </div>
        </div>
        <div class="card-actions">
          ${isAdmin ? '<button class="btn-sm admin-action visible" onclick="editItem(' + i.id + ')">수정</button><button class="btn-sm del admin-action visible" onclick="deleteItem(' + i.id + ')">삭제</button>' : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id) { document.getElementById('card-' + id).classList.toggle('open'); }

function addLog(id) {
  const d = document.getElementById('ld-' + id);
  const u = document.getElementById('lu-' + id);
  if (!d || !d.value) { alert('날짜를 선택해주세요.'); return; }
  const i = items.find(x => x.id === id);
  if (i) {
    if (!i.logs) i.logs = [];
    i.logs.push({ date: d.value, university: u.value.trim() || '-' });
    scheduleSave();
    renderList();
    setTimeout(() => { const c = document.getElementById('card-' + id); if (c && !c.classList.contains('open')) c.classList.add('open'); }, 50);
  }
}
function deleteLog(iid, li) {
  const i = items.find(x => x.id === iid);
  if (i && i.logs) { i.logs.splice(li, 1); scheduleSave(); renderList(); }
}
function deleteItem(id) {
  if (!isAdmin) { alert('관리자만 삭제할 수 있습니다.'); return; }
  if (!confirm('이 문의를 삭제하시겠습니까?')) return;
  items = items.filter(i => i.id !== id);
  scheduleSave(); renderFilters(); renderList();
}
function editItem(id) {
  const i = items.find(x => x.id === id); if (!i) return;
  document.getElementById('f-date').value = i.created || '';
  document.getElementById('f-university').value = '';
  document.getElementById('f-question').value = i.question;
  document.getElementById('f-answer').value = i.answer;
  document.getElementById('edit-id').value = i.id;
  document.getElementById('form-title').textContent = '문의 수정';
  switchTab('add');
}

// ================================================================
// 문의 저장/수정
// ================================================================
function getSelectedCats() {
  return [...document.querySelectorAll('#f-cat-grid .cat-check-item.checked')].map(el => el.dataset.cat);
}

function saveItem() {
  const q   = document.getElementById('f-question').value.trim();
  const a   = document.getElementById('f-answer').value.trim();
  const cats = getSelectedCats();
  const date = normalizeDate(document.getElementById('f-date').value) || new Date().toISOString().slice(0, 10);
  const uni = document.getElementById('f-university').value.trim();
  const eid = document.getElementById('edit-id').value;
  if (!q || !a) { alert('문의 내용과 답변을 모두 입력해주세요.'); return; }
  if (cats.length === 0) { alert('카테고리를 1개 이상 선택해주세요.'); return; }
  const catStr = cats.join(',');
  if (eid) {
    const idx = items.findIndex(i => i.id == eid);
    if (idx > -1) items[idx] = { ...items[idx], question: q, answer: a, category: catStr, created: date };
  } else {
    items.push({ id: Date.now(), question: q, answer: a, category: catStr, logs: uni ? [{ date, university: uni }] : [], created: date });
  }
  scheduleSave(); resetForm(); switchTab('search');
}

function resetForm() {
  ['f-question', 'f-answer', 'f-university'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);
  document.getElementById('edit-id').value = '';
  document.getElementById('form-title').textContent = '새 문의 등록';
  populateCategorySelect([]);
}

function populateCategorySelect(selectedCats = []) {
  const grid = document.getElementById('f-cat-grid');
  const hint = document.getElementById('f-cat-hint');
  if (!grid) return;
  grid.innerHTML = categories.map(c => {
    const on = selectedCats.includes(c);
    return `<div class="cat-check-item${on ? ' checked' : ''}" data-cat="${c}" onclick="toggleCatCheck(this)">${c}</div>`;
  }).join('');
  updateCatHint();
}

function toggleCatCheck(el) {
  const checked = document.querySelectorAll('#f-cat-grid .cat-check-item.checked');
  if (!el.classList.contains('checked') && checked.length >= 3) {
    alert('카테고리는 최대 3개까지 선택 가능합니다.');
    return;
  }
  el.classList.toggle('checked');
  updateCatHint();
}

function updateCatHint() {
  const cnt = document.querySelectorAll('#f-cat-grid .cat-check-item.checked').length;
  const hint = document.getElementById('f-cat-hint');
  if (hint) hint.textContent = cnt > 0 ? `${cnt}개 선택됨 (최대 3개)` : '카테고리를 선택하세요';
}

function editItem(id) {
  const i = items.find(x => x.id === id); if (!i) return;
  document.getElementById('f-date').value = i.created || '';
  document.getElementById('f-university').value = '';
  document.getElementById('f-question').value = i.question;
  document.getElementById('f-answer').value = i.answer;
  const selectedCats = getItemCats(i);
  populateCategorySelect(selectedCats);
  document.getElementById('edit-id').value = i.id;
  document.getElementById('form-title').textContent = '문의 수정';
  switchTab('add');
}
function renderCatManage() {
  editingCatIdx = -1;
  document.getElementById('cat-tbody').innerHTML = categories.map((c, i) => `
    <tr id="cat-row-${i}">
      <td>
        <div class="cat-name-cell">
          <span class="cat-name-display" id="cat-display-${i}" onclick="startEditCat(${i})" title="클릭하여 수정">${c}</span>
          <input class="cat-name-input" id="cat-input-${i}" value="${c}" style="display:none"
            onkeydown="if(event.key==='Enter')saveEditCat(${i});if(event.key==='Escape')cancelEditCat(${i})">
        </div>
      </td>
      <td style="text-align:center"><span class="cat-count-num">${items.filter(it => getItemCats(it).includes(c)).length}</span></td>
      <td>
        <div style="display:flex;gap:6px;justify-content:flex-end">
          <button class="cat-edit-btn" id="cat-edit-btn-${i}" onclick="startEditCat(${i})">수정</button>
          <button class="cat-edit-btn save" id="cat-save-btn-${i}" style="display:none" onclick="saveEditCat(${i})">저장</button>
          <button class="cat-del-btn" id="cat-cancel-btn-${i}" style="display:none" onclick="cancelEditCat(${i})">취소</button>
          <button class="cat-del-btn" onclick="deleteCategory(${i})">삭제</button>
        </div>
      </td>
    </tr>`).join('');
}
function startEditCat(idx) {
  if (editingCatIdx >= 0 && editingCatIdx !== idx) cancelEditCat(editingCatIdx);
  editingCatIdx = idx;
  document.getElementById(`cat-display-${idx}`).style.display = 'none';
  const inp = document.getElementById(`cat-input-${idx}`); inp.style.display = ''; inp.focus(); inp.select();
  document.getElementById(`cat-edit-btn-${idx}`).style.display = 'none';
  document.getElementById(`cat-save-btn-${idx}`).style.display = '';
  document.getElementById(`cat-cancel-btn-${idx}`).style.display = '';
}
function cancelEditCat(idx) {
  document.getElementById(`cat-display-${idx}`).style.display = '';
  document.getElementById(`cat-input-${idx}`).style.display = 'none';
  document.getElementById(`cat-edit-btn-${idx}`).style.display = '';
  document.getElementById(`cat-save-btn-${idx}`).style.display = 'none';
  document.getElementById(`cat-cancel-btn-${idx}`).style.display = 'none';
  document.getElementById(`cat-input-${idx}`).value = categories[idx];
  editingCatIdx = -1;
}
function saveEditCat(idx) {
  const newName = document.getElementById(`cat-input-${idx}`).value.trim();
  if (!newName) { alert('카테고리명을 입력해주세요.'); return; }
  if (newName !== categories[idx] && categories.includes(newName)) { alert('이미 존재하는 카테고리명입니다.'); return; }
  const oldName = categories[idx];
  categories[idx] = newName;
  items.forEach(i => {
    const cats = getItemCats(i);
    const pos = cats.indexOf(oldName);
    if (pos > -1) { cats[pos] = newName; i.category = cats.join(','); }
  });
  if (activeCategories.has(oldName)) { activeCategories.delete(oldName); activeCategories.add(newName); }
  scheduleSave(); renderCatManage(); renderFilters(); populateCategorySelect([]);
  editingCatIdx = -1;
}
function addCategory() {
  const inp = document.getElementById('new-cat-input'); const v = inp.value.trim();
  if (!v) return;
  if (categories.includes(v)) { alert('이미 존재합니다.'); return; }
  categories.push(v); inp.value = '';
  scheduleSave(); renderCatManage(); renderFilters(); populateCategorySelect([]);
}
function deleteCategory(idx) {
  const cat = categories[idx];
  if (items.some(i => getItemCats(i).includes(cat)) && !confirm(`"${cat}" 카테고리 사용 중인 문의가 있습니다. 삭제하시겠습니까?`)) return;
  categories.splice(idx, 1);
  activeCategories.delete(cat);
  scheduleSave(); renderCatManage(); renderFilters(); populateCategorySelect([]);
}

// ================================================================
// 통계
// ================================================================
function getMonthKeys(n) {
  const keys = []; const now = new Date();
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    keys.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`);
  }
  return keys;
}
function setPeriod(n, btn) {
  chartPeriod = n;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); renderMonthChart();
}
function renderStats() {
  const allLogs = items.flatMap(i => i.logs || []);
  const now = new Date(); const thisMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  const thisMonthCount = allLogs.filter(l => l.date && l.date.startsWith(thisMonth)).length;
  const unis = new Set(allLogs.map(l => l.university).filter(u => u && u !== '-'));
  document.getElementById('stats-kpi').innerHTML = `
    <div class="kpi"><div class="kpi-label">총 문의 유형</div><div class="kpi-num">${items.length}</div><div class="kpi-sub">등록된 FAQ 항목</div></div>
    <div class="kpi"><div class="kpi-label">총 문의 건수</div><div class="kpi-num">${allLogs.length}</div><div class="kpi-sub">전체 이력 기준</div></div>
    <div class="kpi"><div class="kpi-label">이번 달 문의</div><div class="kpi-num">${thisMonthCount}</div><div class="kpi-sub">${thisMonth}</div></div>
    <div class="kpi"><div class="kpi-label">문의 대학 수</div><div class="kpi-num">${unis.size}</div><div class="kpi-sub">누적 기준</div></div>`;
  renderMonthChart(); renderCatBars(); renderTimeline();
}
function renderMonthChart() {
  const keys = getMonthKeys(chartPeriod);
  const allLogs = items.flatMap(i => i.logs || []);
  const counts = keys.map(k => allLogs.filter(l => l.date && l.date.startsWith(k)).length);
  const max = Math.max(...counts, 1);
  document.getElementById('month-chart').innerHTML = counts.map((cnt, i) => {
    const pct = Math.round((cnt / max) * 100); const label = keys[i].slice(5) + '월';
    return `<div class="bar-col"><div class="bar-val">${cnt > 0 ? cnt : ''}</div><div class="bar-inner" style="height:${Math.max(pct, 2)}%"><span class="bar-label">${label}</span></div></div>`;
  }).join('');
}
function renderCatBars() {
  const allLogs = items.flatMap(i => i.logs || []);
  const cm = {};
  items.forEach(i => {
    getItemCats(i).forEach(c => { cm[c] = (cm[c] || 0) + (i.logs || []).length; });
  });
  const sorted = Object.entries(cm).sort((a, b) => b[1] - a[1]); const mv = sorted[0]?.[1] || 1; const total = allLogs.length || 1;
  document.getElementById('cat-stats-sub').textContent = `총 ${allLogs.length}건`;
  document.getElementById('cat-stats-bars').innerHTML = sorted.map(([cat, cnt]) => `
    <div class="cat-bar-row">
      <div class="cat-bar-hd"><span>${cat}</span><span>${cnt}건 (${Math.round(cnt / total * 100)}%)</span></div>
      <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${Math.round(cnt / mv * 100)}%"></div></div>
    </div>`).join('');
}
function renderTimeline() {
  const allEntries = [];
  items.forEach(item => (item.logs || []).forEach(log => {
    if (log.date) allEntries.push({ date: log.date, university: log.university || '-', category: getItemCats(item).join(', '), question: item.question });
  }));
  allEntries.sort((a, b) => b.date.localeCompare(a.date));
  const recent = allEntries.slice(0, 15);
  document.getElementById('tl-count').textContent = `최근 ${recent.length}건`;
  const el = document.getElementById('tl-list');
  if (!recent.length) { el.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--ink3);font-size:13px">등록된 문의 이력이 없습니다</div>'; return; }
  el.innerHTML = recent.map(e => `
    <div class="tl-item">
      <div class="tl-dot-wrap"><div class="tl-dot"></div><div class="tl-line"></div></div>
      <div class="tl-body">
        <div class="tl-top"><span class="tl-uni">${e.university}</span><span class="tl-cat">${e.category}</span><span class="tl-date">${e.date}</span></div>
        <div class="tl-q">${e.question}</div>
      </div>
    </div>`).join('');
}

// ================================================================
// 탭 전환
// ================================================================
function switchTab(tab) {
  const names = ['search', 'add', 'cats', 'stats'];
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', names[i] === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'search') { renderFilters(); renderList(); }
  if (tab === 'add') { populateCategorySelect([]); if (!document.getElementById('f-date').value) document.getElementById('f-date').value = new Date().toISOString().slice(0, 10); }
  if (tab === 'cats') renderCatManage();
  if (tab === 'stats') renderStats();
}

// ================================================================
// 초기화
// ================================================================
(function init() {
  loadLocal();
  document.getElementById('f-date').value = new Date().toISOString().slice(0, 10);
  renderFilters(); renderList(); populateCategorySelect([]);
})();
</script>
</body>
